name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - run: pnpm build

      - name: Test core
        run: pnpm --filter @realtalk-ai/core test

      - name: Test react
        run: pnpm --filter @realtalk-ai/react test

      - name: Test react-native
        run: pnpm --filter @realtalk-ai/react-native test
